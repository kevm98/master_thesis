class distance_to_goal(ManagerTermBase):
    def __init__(self, cfg: SceneEntityCfg, env: ManagerBasedRLEnv):
        super().__init__(cfg, env)
        
        self.tcp_transformer = env.scene["tcp_transformer"]

    def __call__(self, env: ManagerBasedRLEnv) -> torch.Tensor:
        tcp_pos_local = self.tcp_transformer.data.target_pos_source[:, 0, :] # unimog base coordinate system
        command = env.command_manager.get_command("ee_pose") # unimog base coordinate system
        
        target_xy = command[:, :2]
        current_xy_local = tcp_pos_local[:, :2]
        difference_xy = target_xy - current_xy_local # maybe add torch.abs
        
        #print("target: ", target_xy)
        #print("current: ", current_xy_local)
        #print("difference (obs): ", difference_xy)
        difference_xy = torch.nan_to_num(difference_xy, nan=0.0, posinf=0.0, neginf=0.0)

        # ---- OBS NORMALIZATION CHECK ----
        if torch.isnan(difference_xy).any() or torch.isinf(difference_xy).any():
            raise RuntimeError(f"[OBS ERROR] distance_to_goal produced NaN/Inf")

        max_abs = difference_xy.abs().max().item()
        if max_abs > 25.0:   # adjust threshold depending on expected scale
            print(f"[OBS WARNING] distance_to_goal not normalized, max|v|={max_abs:.3e}")
        # ---------------------------------
        return difference_xy


class contact_force(ManagerTermBase):
    def __init__(self, cfg: SceneEntityCfg, env: ManagerBasedRLEnv):
        super().__init__(cfg, env)
        
        self.tcp_transformer = env.scene["tcp_transformer"]
        self.contact_sensor = env.scene["contact_sensor_head"]

    def __call__(self, env: ManagerBasedRLEnv) -> torch.Tensor:

        forces = self.contact_sensor.data.net_forces_w # [N, 1, 3]

        rotated_forces = quat_apply_inverse(self.tcp_transformer.data.target_quat_w, forces)
        #print("rotated force: ", rotated_forces)

        force_magnitude = torch.norm(rotated_forces, dim=-1) # maybe no norm
        #print("Impact: ", torch.clamp(force_magnitude, max=10000.0)) 

        return torch.clamp(force_magnitude, max=10000.0)
    
class normalized_contact_force(ManagerTermBase):
    def __init__(
        self,
        cfg: SceneEntityCfg,
        env: ManagerBasedRLEnv,
        max_force: float = 10000.0,
        eps: float = 1e-6,
    ):
        super().__init__(cfg, env)

        self.tcp_transformer = env.scene["tcp_transformer"]
        self.contact_sensor = env.scene["contact_sensor_head"]
        self.max_force = max_force
        self.eps = eps

    def __call__(self, env: ManagerBasedRLEnv) -> torch.Tensor:
        # raw world-frame forces
        forces = self.contact_sensor.data.net_forces_w  # (N, 1, 3)

        # rotate into TCP frame
        rotated_forces = quat_apply_inverse(
            self.tcp_transformer.data.target_quat_w,
            forces,
        )

        # magnitude
        force_mag = torch.norm(rotated_forces, dim=-1)  # (N, 1)

        # normalize (stable version)
        normalized_force = torch.tanh(force_mag / (self.max_force + self.eps))
        normalized_force = torch.nan_to_num(normalized_force, nan=0.0, posinf=1.0, neginf=0.0)
        
        # ---- OBS NORMALIZATION CHECK ----
        if torch.isnan(normalized_force).any() or torch.isinf(normalized_force).any():
            raise RuntimeError(f"[OBS ERROR] normalized_contact_force produced NaN/Inf")

        max_abs = normalized_force.abs().max().item()
        if max_abs > 5.0:   # adjust threshold depending on expected scale
            print(f"[OBS WARNING] normalized_contact_force not normalized, max|v|={max_abs:.3e}")
        # ---------------------------------
        return normalized_force


