class custom_unimog_pose(ManagerTermBase): # combines pos. and orient. of unimog
    def __init__(self, cfg: SceneEntityCfg, env: ManagerBasedRLEnv):
        super().__init__(cfg, env)
        
        self.asset = env.scene["robot"]

    def __call__(self, env: ManagerBasedRLEnv) -> torch.Tensor:

        pos = self.asset.data.root_pos_w - env.scene.env_origins
        orientation = torch.stack(euler_xyz_from_quat(self.asset.data.root_quat_w), dim=1)

        combined = torch.cat((pos[:, :2], orientation[:, 2].unsqueeze(1)), dim=-1) # slice pos. to x,y and orient. to yaw

        # print("Unimog Custom Pose: ", combined)
        return combined

def normalized_unimog_pose(
    env: ManagerBasedRLEnv,
    asset_cfg: SceneEntityCfg = SceneEntityCfg("robot"),
    x_center: float = -0.0,
    x_half_range: float = 25.0,   # (15 - (-25)) / 2 = 20
    y_center: float = 4.0,
    y_half_range: float = 4.0,    # (8 - 0) / 2 = 4
    yaw_scale: float = 0.15,
    eps: float = 1e-6,
) -> torch.Tensor:
    """Return normalized (x,y,yaw) for Unimog-like base.

    Output: (N, 4) = [x_norm, y_norm, sin(yaw), cos(yaw)]
    """
    robot = env.scene["robot"]

    env_origins = env.scene.env_origins           # (N,3)
    root_pos_w = robot.data.root_pos_w            # (N,3)
    root_quat_w = robot.data.root_quat_w          # (N,4)

    # local position
    local_pos = root_pos_w - env_origins

    x = local_pos[:, 0]
    y = local_pos[:, 1]

    # yaw
    _, _, yaw = euler_xyz_from_quat(root_quat_w)


    # normalize to about [-1, 1]
    x_norm = (x - x_center) / (x_half_range + eps)
    y_norm = (y - y_center) / (y_half_range + eps)

    # keep yaw bounded + robust
    sin_yaw = torch.sin(yaw)
    cos_yaw = torch.cos(yaw)

    # safety clamp on position norms (optional but good)
    x_norm = torch.clamp(x_norm, -1.5, 1.5)
    y_norm = torch.clamp(y_norm, -1.5, 1.5)

    out = torch.stack([x_norm, y_norm, sin_yaw, cos_yaw], dim=-1)
    out = torch.nan_to_num(out, nan=0.0, posinf=0.0, neginf=0.0)

    # ---- OBS NORMALIZATION CHECK ----
    if torch.isnan(out).any() or torch.isinf(out).any():
        raise RuntimeError(f"[OBS ERROR] normalized_unimog_pose produced NaN/Inf")

    max_abs = out.abs().max().item()
    if max_abs > 5.0:   # adjust threshold depending on expected scale
        print(f"[OBS WARNING] normalized_unimog_pose not normalized, max|v|={max_abs:.3e}")
    # ---------------------------------

    return out
    
class custom_unimog_pose_dot(ManagerTermBase): # combines pos. and orient. of unimog (dot)
    def __init__(self, cfg: SceneEntityCfg, env: ManagerBasedRLEnv):
        super().__init__(cfg, env)
        
        self.asset = env.scene["robot"]

    def __call__(self, env: ManagerBasedRLEnv) -> torch.Tensor:

        pos_dot = self.asset.data.root_lin_vel_w
        orientation_dot = self.asset.data.root_ang_vel_w

        combined_dot = torch.cat((pos_dot[:, :2], orientation_dot[:, 2].unsqueeze(1)), dim=-1) # slice pos. to x,y and orient. to yaw

        #print("Unimog Custom Pose (Dot): ", combined_dot)
        combined_dot = torch.nan_to_num(combined_dot, nan=0.0, posinf=0.0, neginf=0.0)

        # ---- OBS NORMALIZATION CHECK ----
        if torch.isnan(combined_dot).any() or torch.isinf(combined_dot).any():
            raise RuntimeError(f"[OBS ERROR] custom_unimog_pose_dot produced NaN/Inf")

        max_abs = combined_dot.abs().max().item()
        if max_abs > 5.0:   # adjust threshold depending on expected scale
            print(f"[OBS WARNING] custom_unimog_pose_dot not normalized, max|v|={max_abs:.3e}")
        # ---------------------------------
        return combined_dot



class map_data(ManagerTermBase): # height map prep for observation
    def __init__(self, cfg: ObservationTermCfg, env: ManagerBasedRLEnv):
        super().__init__(cfg, env)

        self.enable_vis = False 
        
        if self.enable_vis:
            plt.ion()
            self.fig, self.ax = plt.subplots(figsize=(6, 5))
            self.sc = self.ax.scatter([], [], c=[], cmap='viridis', s=5, vmin=-1.0, vmax=0.2) 
            
            plt.colorbar(self.sc, ax=self.ax, label='Height (Z)')
            self.ax.set_title("Live Height Map in Base link frame")
            self.ax.set_xlabel("X")
            self.ax.set_ylabel("Y")
            self.ax.axis('equal') 
            self.ax.grid(True)

            self.ax.set_xlim(0.0, 14.0)
            self.ax.set_ylim(-6, 0.0)

    def __call__(
        self,
        env: ManagerBasedRLEnv,
        height_limit: list[float] = [-2.0, 2.0],
    ) -> torch.Tensor:
        cfg = env.scene["height_sensor_base"].cfg
        size_x, size_y = cfg.pattern_cfg.size
        cx, cy, _ = cfg.offset.pos

        xmin = cx - size_x / 2
        xmax = cx + size_x / 2
        ymin = cy - size_y / 2
        ymax = cy + size_y / 2

        map_height = env.scene["height_sensor_base"].data.ray_hits_w
        # remove nan/inf immediately (MOST IMPORTANT)
        map_height = torch.nan_to_num(map_height, nan=0.0, posinf=0.0, neginf=0.0)

        frame_data = env.scene["tcp_transformer"].data
        batch_size, num_rays, _ = map_height.shape # batch_size = #envs

        translated_hits= map_height - frame_data.source_pos_w.unsqueeze(1) # translate coordinate of casted ray of world coordinate into local coordinate frame
        translated_hits = torch.nan_to_num(translated_hits, nan=0.0, posinf=0.0, neginf=0.0)

        quat = frame_data.source_quat_w
        quat = torch.nan_to_num(quat, nan=0.0, posinf=0.0, neginf=0.0)

        eps = 1e-6
        quat_norm = torch.linalg.norm(quat, dim=-1, keepdim=True).clamp_min(eps)
        quat = quat / quat_norm

        quat_expanded = quat.unsqueeze(1).expand(-1, num_rays, -1)

        transposed_hits = quat_apply_inverse(quat_expanded, translated_hits)
        transposed_hits = torch.nan_to_num(transposed_hits, nan=0.0, posinf=0.0, neginf=0.0)
        transposed_hits = torch.clamp(transposed_hits, -1e3, 1e3)

        #print("Height Map (size): ", transposed_hits.shape)

        if self.enable_vis and env.common_step_counter % 10 == 0:
            
            points = transposed_hits[0].detach().cpu().numpy()
            x = points[:, 0]
            y = points[:, 1]
            z = points[:, 2]

            self.sc.set_offsets(np.c_[x, y]) 
            self.sc.set_array(z)             

            self.fig.canvas.draw()
            self.fig.canvas.flush_events()
        
        # unpack height limits
        zmin, zmax = height_limit

        # split channels
        x = transposed_hits[..., 0]
        y = transposed_hits[..., 1]
        z = transposed_hits[..., 2]

        dx = max(xmax - xmin, 1e-6)
        dy = max(ymax - ymin, 1e-6)
        dz = max(zmax - zmin, 1e-6)

        # normalize to [-1, 1]
        x_norm = 2.0 * (x - xmin) / dx - 1.0
        y_norm = 2.0 * (y - ymin) / dy - 1.0
        z_norm = 2.0 * (z - zmin) / dz - 1.0

        # stack back
        normalized_hits = torch.stack((x_norm, y_norm, z_norm), dim=-1)
        normalized_hits = torch.nan_to_num(normalized_hits, nan=0.0, posinf=0.0, neginf=0.0)
        normalized_hits = torch.clamp(normalized_hits, -1.0, 1.0)

        grid_map_reordered = normalized_hits.view(batch_size, 21, 41, 3) # (N, 21, 41, 3)
        cnn_ready_map = grid_map_reordered.permute(0, 3, 1, 2) # (N, H, W, C) -> (N, C, H, W)
        cnn_ready_map = torch.nan_to_num(cnn_ready_map, nan=0.0, posinf=0.0, neginf=0.0)
        #print(cnn_ready_map)
        
        # return cnn_ready_map
        return cnn_ready_map[:, 2, :, :] # only z
    
def normalized_distance_data(env: ManagerBasedRLEnv, max_range: float = 15.0,):
        distance_rays = env.scene["distance_scanner"].data.ray_hits_w
        tcp_data = env.scene["tcp_transformer"].data
        # print("observation, transposed hits: ", tcp_data)

        # isaaclab.utils transform_points not working correctly
        R = distance_rays.shape[1]
        translated_hits = distance_rays - tcp_data.target_pos_w # translate coordinate of casted ray of world coordinate into local coordinate frame
        # print("observation translated_hits shape: ", translated_hits.shape)
        # print("observation tcp_data.target_quat_w shape: ", tcp_data.target_quat_w.shape)
        transposed_hits = quat_apply_inverse(tcp_data.target_quat_w.expand(-1, R, -1), translated_hits) # rotate coordinate of casted ray of world coordinate into local coordinate frame
        # print("observation, transposed hits: ", transposed_hits)
        invalid = torch.isnan(transposed_hits).any(dim=-1)

        distance = torch.norm(transposed_hits, dim=-1)                           # (N, R)
        distance = torch.where(invalid, torch.full_like(distance, 15), distance)

        # normalize to [0, 1]
        distance_norm = torch.clamp(distance / max_range, 0.0, 1.0)
        distance_norm = torch.nan_to_num(distance_norm, nan=0.0, posinf=0.0, neginf=0.0)
        # print("observation, distance: ", distance)

        # ---- OBS NORMALIZATION CHECK ----
        if torch.isnan(distance_norm).any() or torch.isinf(distance_norm).any():
            raise RuntimeError(f"[OBS ERROR] normalized_distance_data produced NaN/Inf")

        max_abs = distance_norm.abs().max().item()
        if max_abs > 5.0:   # adjust threshold depending on expected scale
            print(f"[OBS WARNING] normalized_distance_data not normalized, max|v|={max_abs:.3e}")
        # ---------------------------------

        return distance_norm

class height_data(ManagerTermBase): # height Sensor prep for observation
    def __init__(self, cfg: ObservationTermCfg, env: ManagerBasedRLEnv):
        super().__init__(cfg, env)

    def __call__(
        self,
        env: ManagerBasedRLEnv,
    ) -> torch.Tensor:

        left_height = env.scene["height_sensor_left"].data.ray_hits_w
        right_height = env.scene["height_sensor_right"].data.ray_hits_w
        tcp_data = env.scene["tcp_transformer"].data

        # isaaclab.utils transform_points not working correctly
        translated_hits_left = left_height - tcp_data.target_pos_w # translate coordinate of casted ray of world coordinate into local coordinate frame
        transposed_hits_left = quat_apply_inverse(tcp_data.target_quat_w, translated_hits_left) # rotate coordinate of casted ray of world coordinate into local coordinate frame
        
        translated_hits_right = right_height - tcp_data.target_pos_w # translate coordinate of casted ray of world coordinate into local coordinate frame
        transposed_hits_right = quat_apply_inverse(tcp_data.target_quat_w, translated_hits_right) # rotate coordinate of casted ray of world coordinate into local coordinate frame

        # ---- extract z ----
        left_z = transposed_hits_left[:, :, 2]
        right_z = transposed_hits_right[:, :, 2]

        heights = torch.cat([left_z, right_z], dim=1)

        # Remove NaN / Inf
        heights = torch.nan_to_num(heights, nan=0.0, posinf=0.0, neginf=0.0)

        # Clamp to physical range (0–1 meter)
        heights = torch.clamp(heights, 0.0, 1.0)

        # ---- OBS NORMALIZATION CHECK ----
        if torch.isnan(heights).any() or torch.isinf(heights).any():
            raise RuntimeError(f"[OBS ERROR] height_data produced NaN/Inf")

        max_abs = heights.abs().max().item()
        if max_abs > 5.0:   # adjust threshold depending on expected scale
            print(f"[OBS WARNING] height_data not normalized, max|v|={max_abs:.3e}")
        # ---------------------------------

        #print("heights (obs): ", heights)
        return heights
    


