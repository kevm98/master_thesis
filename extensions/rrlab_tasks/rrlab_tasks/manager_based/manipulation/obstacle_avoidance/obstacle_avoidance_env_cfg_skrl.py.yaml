@configclass
class ObstacleAvoidanceCfg(ManagerBasedRLEnvCfg):
    """Configuration for the reach end-effector pose tracking environment."""

    # Scene settings
    scene: ObstacleAvoidanceSceneCfg = ObstacleAvoidanceSceneCfg(num_envs=169, env_spacing=20)
    # Basic settings
    observations: ObservationsCfg = ObservationsCfg()
    actions: ActionsCfg = ActionsCfg()
    commands: CommandsCfg = CommandsCfg()
    # MDP settings
    rewards: RewardsCfg = RewardsCfg()
    terminations: TerminationsCfg = TerminationsCfg()
    events: EventCfg = EventCfg()
    #recorders: RecordersCfg = RecordersCfg()

    # Action
    # self.actions.joint_pos = JointPositionNormalizedToLimitsActionCfg(asset_name="robot", joint_names=[".*"], scale=0.15)

    # Recorder
    recorders = ActionStateRecorderManagerCfg()
    recorders.record_pre_step_actions = PostStepNormalizedJointPositionActionsRecorderCfg()
    recorders.dataset_export_dir_path = "datasets"
    recorders.dataset_filename = "mulag_teacher_lstm_dataset"

    def __post_init__(self):
        """Post initialization."""
        # general settings
        self.decimation = 2
        self.sim.dt = 1.0 / 120.0
        self.sim.render_interval = self.decimation
        self.episode_length_s = 34.0
        
        self.viewer.eye = (12.8, -6.7, 3.3)
        
        # default friction material
        self.sim.physics_material.static_friction = 1.0
        self.sim.physics_material.dynamic_friction = 1.0
        self.sim.physics_material.restitution = 0.0

