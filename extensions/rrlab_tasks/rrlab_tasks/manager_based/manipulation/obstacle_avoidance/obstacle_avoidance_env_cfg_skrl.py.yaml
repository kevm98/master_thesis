@configclass
class CommandsCfg:
    """Command terms for the MDP."""

    ee_pose = CustomUniformPoseCommandCfg(
        asset_name="robot",
        body_name=MISSING,
        resampling_time_range=(10.0, 12.0),
        debug_vis=True,
        ranges=CustomUniformPoseCommandCfg.Ranges(
            pos_x=(6.5, 7.5),
            pos_y=(0.7, 2.2), # at which pos the arm should mow 
            pos_z=(0.5, 0.5),
