        }
    )

    tcp_off_working_space = DoneTerm(
        func=mdp.tcp_off_working_space_termination,
        params={
            "asset_cfg": SceneEntityCfg("robot", body_names="Messerkopf"),
            "threshold": -1.7, # in y axis
            "hysteresis": 0.2,
            "time_threshold_sec":5
        }
    )

